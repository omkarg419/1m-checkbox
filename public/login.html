<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Login - 1M Checkboxes</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@500;700&display=swap");

			:root {
				--bg-deep: #081018;
				--bg-mid: #13273a;
				--panel: rgba(255, 255, 255, 0.07);
				--panel-border: rgba(255, 255, 255, 0.15);
				--text-main: #ecf8ff;
				--text-muted: #b9d8e7;
				--accent: #42e3a4;
				--accent-strong: #19ba7f;
				--glow: rgba(66, 227, 164, 0.38);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				padding: 2rem;
				color: var(--text-main);
				font-family: "Manrope", "Segoe UI", sans-serif;
				background:
					radial-gradient(
						circle at 20% 15%,
						rgba(66, 227, 164, 0.2),
						transparent 42%
					),
					radial-gradient(
						circle at 80% 80%,
						rgba(89, 203, 255, 0.23),
						transparent 45%
					),
					linear-gradient(145deg, var(--bg-deep), var(--bg-mid));
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.login-container {
				width: 100%;
				max-width: 400px;
				padding: 2.5rem;
				background: var(--panel);
				border: 1px solid var(--panel-border);
				border-radius: 16px;
				backdrop-filter: blur(10px);
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
			}

			.login-container h1 {
				font-family: "Space Grotesk", monospace;
				font-size: 1.75rem;
				margin: 0 0 1rem 0;
				text-align: center;
				color: var(--accent);
			}

			.login-container p {
				text-align: center;
				color: var(--text-muted);
				margin-bottom: 2rem;
				font-size: 0.95rem;
			}

			.login-button {
				width: 100%;
				padding: 1rem;
				background: linear-gradient(
					135deg,
					var(--accent),
					var(--accent-strong)
				);
				color: var(--bg-deep);
				border: none;
				border-radius: 8px;
				font-size: 1rem;
				font-weight: 700;
				cursor: pointer;
				transition: all 0.3s ease;
				box-shadow: 0 4px 15px rgba(66, 227, 164, 0.4);
			}

			.login-button:hover {
				transform: translateY(-2px);
				box-shadow: 0 6px 20px rgba(66, 227, 164, 0.6);
			}

			.login-button:active {
				transform: translateY(0);
			}

			.loading {
				display: none;
				text-align: center;
				color: var(--text-muted);
				margin-top: 1rem;
			}

			.spinner {
				display: inline-block;
				width: 20px;
				height: 20px;
				border: 3px solid var(--panel-border);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				margin-right: 0.5rem;
				vertical-align: middle;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			.error-message {
				color: #ff6b6b;
				text-align: center;
				margin-bottom: 1rem;
				padding: 0.75rem;
				background: rgba(255, 107, 107, 0.1);
				border-radius: 8px;
				display: none;
			}

			.features {
				margin-top: 2rem;
				padding-top: 2rem;
				border-top: 1px solid var(--panel-border);
			}

			.features h3 {
				font-size: 0.9rem;
				color: var(--accent);
				margin-bottom: 1rem;
			}

			.features ul {
				list-style: none;
				padding: 0;
				margin: 0;
			}

			.features li {
				padding: 0.5rem 0;
				color: var(--text-muted);
				font-size: 0.85rem;
				display: flex;
				align-items: center;
			}

			.features li:before {
				content: "✓";
				color: var(--accent);
				margin-right: 0.5rem;
				font-weight: 700;
			}
		</style>
	</head>
	<body>
		<div class="login-container">
			<h1>1M Checkboxes</h1>
			<p>Secure real-time checkbox management with OAuth 2.0</p>

			<div
				class="error-message"
				id="errorMessage"
			></div>

			<button
				class="login-button"
				onclick="login()"
				id="loginBtn"
			>
				Login with OIDC
			</button>

			<div
				class="loading"
				id="loading"
			>
				<span class="spinner"></span>
				<span>Redirecting to login...</span>
			</div>

			<div class="features">
				<h3>Protected Features:</h3>
				<ul>
					<li>OAuth 2.0 Authentication</li>
					<li>Secure Session Management</li>
					<li>Real-time Updates</li>
					<li>Rate Limiting</li>
				</ul>
			</div>
		</div>

		<script>
			function login() {
				window.location.href = "/auth/login";
			}

			// Check if user is already authenticated
			async function checkAuth() {
				try {
					const response = await fetch("/auth/status");
					const data = await response.json();
					if (data.authenticated) {
						window.location.href = "/dashboard.html";
					}
				} catch (error) {
					console.error("Auth check error:", error);
				}
			}

			// Check for error parameter in URL
			function checkUrlError() {
				const params = new URLSearchParams(window.location.search);
				const error = params.get("error");
				if (error) {
					const errorMessage = document.getElementById("errorMessage");
					errorMessage.textContent =
						"Authentication failed: " + decodeURIComponent(error);
					errorMessage.style.display = "block";
				}
			}

			// Run checks on page load
			document.addEventListener("DOMContentLoaded", () => {
				document.getElementById("loginBtn").onclick = login;
				checkUrlError();
				checkAuth();
			});
		</script>
	</body>
</html>
