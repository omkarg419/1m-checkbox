<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Dashboard - 1M Checkboxes</title>
		<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@500;700&display=swap");

			:root {
				--bg-deep: #081018;
				--bg-mid: #13273a;
				--panel: rgba(255, 255, 255, 0.07);
				--panel-border: rgba(255, 255, 255, 0.15);
				--text-main: #ecf8ff;
				--text-muted: #b9d8e7;
				--accent: #42e3a4;
				--accent-strong: #19ba7f;
				--glow: rgba(66, 227, 164, 0.38);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				padding: 0;
				min-height: 100vh;
				color: var(--text-main);
				font-family: "Manrope", "Segoe UI", sans-serif;
				background:
					radial-gradient(
						circle at 20% 15%,
						rgba(66, 227, 164, 0.2),
						transparent 42%
					),
					radial-gradient(
						circle at 80% 80%,
						rgba(89, 203, 255, 0.23),
						transparent 45%
					),
					linear-gradient(145deg, var(--bg-deep), var(--bg-mid));
				display: grid;
				grid-template-rows: auto 1fr;
			}

			header {
				background: rgba(0, 0, 0, 0.3);
				border-bottom: 1px solid var(--panel-border);
				padding: 1rem 2rem;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.header-left {
				display: flex;
				align-items: center;
				gap: 2rem;
			}

			.header-title {
				font-family: "Space Grotesk", monospace;
				font-size: 1.5rem;
				margin: 0;
				color: var(--accent);
			}

			.user-info {
				display: flex;
				align-items: center;
				gap: 1rem;
			}

			.user-avatar {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				background: linear-gradient(
					135deg,
					var(--accent),
					var(--accent-strong)
				);
				display: flex;
				align-items: center;
				justify-content: center;
				font-weight: 700;
				color: var(--bg-deep);
			}

			.user-details p {
				margin: 0;
				font-size: 0.9rem;
				color: var(--text-muted);
			}

			.user-details .name {
				font-weight: 700;
				color: var(--text-main);
			}

			.logout-btn {
				padding: 0.5rem 1.5rem;
				background: transparent;
				color: var(--accent);
				border: 1px solid var(--accent);
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.3s ease;
				font-weight: 600;
			}

			.logout-btn:hover {
				background: var(--accent);
				color: var(--bg-deep);
			}

			main {
				padding: clamp(1rem, 3vw, 2.5rem);
				overflow-y: auto;
			}

			.status-bar {
				background: var(--panel);
				border: 1px solid var(--panel-border);
				border-radius: 8px;
				padding: 1rem;
				margin-bottom: 2rem;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.status-item {
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}

			.status-indicator {
				width: 12px;
				height: 12px;
				border-radius: 50%;
				background: var(--accent);
				animation: pulse 2s ease-in-out infinite;
			}

			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.5;
				}
			}

			.checkbox-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
				gap: 0.5rem;
				padding: 1.5rem;
				background: var(--panel);
				border: 1px solid var(--panel-border);
				border-radius: 12px;
				max-height: 70vh;
				overflow-y: auto;
			}

			.checkbox-item {
				aspect-ratio: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				background: rgba(0, 0, 0, 0.2);
				border: 1px solid var(--panel-border);
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.2s ease;
				position: relative;
			}

			.checkbox-item:hover {
				background: rgba(66, 227, 164, 0.1);
				border-color: var(--accent);
			}

			.checkbox-item.checked {
				background: linear-gradient(
					135deg,
					var(--accent),
					var(--accent-strong)
				);
				border-color: var(--accent);
			}

			.checkbox-item.checked::after {
				content: "✓";
				color: var(--bg-deep);
				font-weight: 700;
				font-size: 1.2rem;
			}

			.notification {
				position: fixed;
				bottom: 2rem;
				right: 2rem;
				padding: 1rem 1.5rem;
				background: var(--panel);
				border: 1px solid var(--panel-border);
				border-radius: 8px;
				color: var(--text-main);
				display: none;
				z-index: 1000;
				animation: slideIn 0.3s ease;
			}

			@keyframes slideIn {
				from {
					transform: translateX(400px);
					opacity: 0;
				}
				to {
					transform: translateX(0);
					opacity: 1;
				}
			}

			.notification.error {
				border-color: #ff6b6b;
				color: #ff6b6b;
			}

			.notification.success {
				border-color: var(--accent);
				color: var(--accent);
			}

			.loading-text {
				text-align: center;
				color: var(--text-muted);
				padding: 2rem;
			}
		</style>
	</head>
	<body>
		<header>
			<div class="header-left">
				<h1 class="header-title">1M Checkboxes</h1>
				<div class="user-info">
					<div
						class="user-avatar"
						id="userAvatar"
					>
						?
					</div>
					<div class="user-details">
						<p
							class="name"
							id="userName"
						>
							Loading...
						</p>
						<p id="userEmail"></p>
					</div>
				</div>
			</div>
			<button
				class="logout-btn"
				onclick="logout()"
			>
				Logout
			</button>
		</header>

		<main>
			<div class="status-bar">
				<div class="status-item">
					<div class="status-indicator"></div>
					<span>Real-time Connection</span>
				</div>
				<div
					class="status-item"
					id="checkboxCount"
				>
					Loaded: 0 checkboxes
				</div>
			</div>

			<div
				class="checkbox-grid"
				id="checkboxGrid"
			>
				<div class="loading-text">Loading checkboxes...</div>
			</div>
		</main>

		<div
			class="notification"
			id="notification"
		></div>

		<script>
			const TOTAL_CHECKBOXES = 100000;
			let socket = null;
			let checkboxStates = new Array(TOTAL_CHECKBOXES).fill(false);

			// Initialize on page load
			document.addEventListener("DOMContentLoaded", () => {
				initializeApp();
			});

			async function initializeApp() {
				const user = await checkAuth();
				if (!user) return;

				await loadUserInfo();
				await loadCheckboxes();
				initializeSocket();
			}

			/**
			 * Load and display user information
			 */
			async function loadUserInfo() {
				try {
					const response = await fetch("/auth/user");
					if (!response.ok) {
						throw new Error("Failed to load user info");
					}

					const data = await response.json();
					const user = data.user;

					document.getElementById("userName").textContent = user.name || "User";
					document.getElementById("userEmail").textContent = user.email;

					// Set avatar with first letter of name
					const firstLetter = (user.name || "U").charAt(0).toUpperCase();
					document.getElementById("userAvatar").textContent = firstLetter;
				} catch (error) {
					console.error("Error loading user info:", error);
					showNotification("Failed to load user information", "error");
				}
			}

			/**
			 * Load checkbox states from server
			 */
			async function loadCheckboxes() {
				try {
					const response = await fetch("/checkboxes");
					if (!response.ok) {
						throw new Error("Failed to load checkboxes");
					}

					const data = await response.json();
					checkboxStates = data.checkboxes;

					renderCheckboxes();
					updateCheckboxCount();
				} catch (error) {
					console.error("Error loading checkboxes:", error);
					showNotification(
						"Failed to load checkboxes: " + error.message,
						"error",
					);
				}
			}

			/**
			 * Render checkboxes in the grid
			 */
			function renderCheckboxes() {
				const grid = document.getElementById("checkboxGrid");
				grid.innerHTML = "";

				// Render checkboxes with virtual scrolling for performance
				for (let i = 0; i < TOTAL_CHECKBOXES; i++) {
					const checkbox = document.createElement("div");
					checkbox.className = `checkbox-item ${
						checkboxStates[i] ? "checked" : ""
					}`;
					checkbox.dataset.index = i;
					checkbox.onclick = () => toggleCheckbox(i);
					grid.appendChild(checkbox);
				}
			}

			/**
			 * Toggle checkbox state and emit event
			 */
			async function toggleCheckbox(index) {
				const newState = !checkboxStates[index];
				checkboxStates[index] = newState;

				// Update UI immediately
				const element = document.querySelector(`[data-index="${index}"]`);
				if (element) {
					element.classList.toggle("checked", newState);
				}

				// Emit through socket
				if (socket && socket.connected) {
					socket.emit("client:checkbox:change", {
						i: index,
						checked: newState,
					});
				}
			}

			/**
			 * Update the checkbox count display
			 */
			function updateCheckboxCount() {
				const checkedCount = checkboxStates.filter((state) => state).length;
				document.getElementById("checkboxCount").textContent =
					`Checked: ${checkedCount} / ${TOTAL_CHECKBOXES}`;
			}

			/**
			 * Initialize Socket.IO connection with authentication
			 */
			function initializeSocket() {
				socket = io({
					withCredentials: true,
					reconnection: true,
					reconnectionDelay: 1000,
					reconnectionDelayMax: 5000,
					reconnectionAttempts: 5,
				});

				socket.on("connect", () => {
					console.log("Socket connected:", socket.id);
					showNotification("Connected to server", "success");
				});

				socket.on("disconnect", () => {
					console.log("Socket disconnected");
					showNotification("Disconnected from server", "error");
				});

				socket.on("connect_error", (error) => {
					console.error("Connection error:", error);
					showNotification("Connection error: " + error.message, "error");
				});

				socket.on("server:checkbox:change", (data) => {
					console.log("Checkbox changed:", data);
					checkboxStates[data.i] = data.checked;

					const element = document.querySelector(`[data-index="${data.i}"]`);
					if (element) {
						element.classList.toggle("checked", data.checked);
					}

					updateCheckboxCount();

					// Show who made the change
					if (data.userName) {
						showNotification(
							`${data.userName} updated checkbox ${data.i}`,
							"success",
						);
					}
				});

				socket.on("server:checkbox:updated", (data) => {
					console.log("Local checkbox confirmed:", data);
				});

				socket.on("server:error", (data) => {
					console.error("Server error:", data.message);
					showNotification(data.message, "error");
				});
			}

			/**
			 * Show notification message
			 */
			function showNotification(message, type = "info") {
				const notification = document.getElementById("notification");
				notification.textContent = message;
				notification.className = `notification ${type}`;
				notification.style.display = "block";

				setTimeout(() => {
					notification.style.display = "none";
				}, 3000);
			}

			/**
			 * Logout user
			 */
			function logout() {
				if (socket) {
					socket.disconnect();
				}
				window.location.href = "/auth/logout";
			}

			/**
			 * Redirect to login if not authenticated
			 */
			async function checkAuth() {
				try {
					const response = await fetch("/auth/status");
					const data = await response.json();
					if (!data.authenticated) {
						window.location.href = "/login.html";
						return null;
					}
					return data.user || null;
				} catch (error) {
					console.error("Auth check error:", error);
					window.location.href = "/login.html";
					return null;
				}
			}

			// Check authentication on page load
		</script>
	</body>
</html>
